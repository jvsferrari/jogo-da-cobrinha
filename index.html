<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/1dc87a602b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="menu">
      <h1>Cobrinha</h1>
      <div class="buttons">
        <div class="compoundButton">
          <button id="difficultyButton">Dificuldade</button>
          <p id="difficulty">Normal</p>
        </div>
        <button id="start">Começar</button>
        <div class="compoundButton">
          <button id="musicButton">Música</button>
          <p id="musicIcon"><i class="fa-solid fa-volume-xmark"></i></p>
        </div>
      </div>
      <div>
        <h2>
          Projeto para a segunda fase do processo seletivo da Fellowship Of Game
        </h2>
        <h2>João Víctor Ferrari Silva</h2>
        <h3>
          <a href="https://freesound.org/people/nathanj848/sounds/749455/"
            >underground song 2</a
          >
          by <a href="https://freesound.org/people/nathanj848/">nathanj848</a> |
          License:
          <a href="https://creativecommons.org/licenses/by/4.0/"
            >Attribution 4.0</a
          >
        </h3>
      </div>
    </div>

    <div id="gameOverPopUp" class="popUp">
      <p>Fim do jogo!</p>
      <div class="buttons">
        <div class="compoundButton">
          <button>Sua pontuação</button>
          <p class="currentScore">0</p>
        </div>
        <button class="tryAgain">Tentar novamente</button>
      </div>
    </div>

    <div id="winPopUp" class="popUp">
      <p>Você venceu, parabéns!</p>
      <div class="buttons">
        <div class="compoundButton">
          <button>Sua pontuação</button>
          <p id="winScore" class="currentScore">0</p>
        </div>
        <button class="tryAgain">Tentar novamente</button>
      </div>
    </div>

    <div id="game">
      <div class="buttons">
        <div class="compoundButton">
          <button id="scoreboard">Pontuação máxima</button>
          <p id="maxScore">0</p>
        </div>
        <div class="compoundButton">
          <button id="scoreboard">Pontuação</button>
          <p id="score" class="currentScore">0</p>
        </div>
        <button id="restart">Reiniciar</button>
        <button id="return">Retornar ao menu</button>
        <p id="lastKey"><i class="fa-solid fa-arrow-down"></i></p>
      </div>
    </div>
  </body>
</html>
