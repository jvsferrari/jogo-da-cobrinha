<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/1dc87a602b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="menu">
      <h1>Cobrinha</h1>
      <div>
        <div class="compoundButton">
          <button id="difficultyButton">Dificuldade</button>
          <p id="difficulty">fácil</p>
        </div>
        <button id="start">Começar</button>
        <div class="compoundButton">
          <button id="musicButton">Música</button>
          <p id="musicIcon"><i class="fa-solid fa-volume-xmark"></i></p>
        </div>
      </div>
    </div>
    <div id="game">
      <div id="stripe3">
        <div class="compoundButton">
          <button id="scoreboard">Pontuação</button>
          <p id="score">0</p>
        </div>
        <button id="restart">Reiniciar</button>
        <button id="return">Retornar ao menu</button>
        <div id="lastKey"><i class="fa-solid fa-arrow-down"></i></div>
      </div>
    </div>
  </body>
</html>
